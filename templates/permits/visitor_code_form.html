{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Générer un code visiteur" %}{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white border rounded-lg p-6 shadow-sm">
    <h1 class="text-2xl font-semibold text-slate-900">{% trans "Nouveau code visiteur" %}</h1>
    <p class="mt-2 text-sm text-slate-600">
      {% trans "Saisissez la plaque du visiteur et la durée (en heures)." %}
    </p>

    <form method="post" class="mt-4 space-y-4">
      {% csrf_token %}
      <div>
        <label for="plate" class="block text-sm font-medium text-slate-700">{% trans "Plaque visiteur" %} <span class="text-red-500">*</span></label>
        <input id="plate" name="plate" type="text" required placeholder="1-ABC-123"
               class="mt-1 block w-full rounded-md border border-slate-300 bg-white px-3 py-2 shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 sm:text-sm">
      </div>
      <div>
        <label for="duration_hours" class="block text-sm font-medium text-slate-700">{% trans "Durée (heures)" %}</label>
        <input id="duration_hours" name="duration_hours" type="number" min="1" max="72" value="4"
               class="mt-1 block w-full rounded-md border border-slate-300 bg-white px-3 py-2 shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500 sm:text-sm">
      </div>
      <div class="flex justify-end gap-2">
        <a href="{% url 'permits:detail' permit.pk %}" class="px-4 py-2 text-sm border rounded-md hover:bg-slate-100">{% trans "Annuler" %}</a>
        <button type="submit" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded-md hover:bg-emerald-700">{% trans "Générer le code" %}</button>
      </div>
    </form>
  </div>
{% endblock %}
