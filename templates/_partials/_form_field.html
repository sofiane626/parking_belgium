{# Render a single Django form field with consistent label, help text and errors. #}
<div>
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700">
    {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
  </label>
  {{ field }}
  {% if field.help_text %}<p class="mt-1 text-xs text-slate-500">{{ field.help_text|safe }}</p>{% endif %}
  {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors|join:", " }}</p>{% endif %}
</div>
