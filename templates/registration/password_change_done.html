{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Mot de passe modifié" %}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white border rounded-lg p-6 shadow-sm text-center">
  <div class="mx-auto w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 text-2xl">✓</div>
  <h1 class="mt-3 text-xl font-semibold text-slate-900">{% trans "Mot de passe mis à jour" %}</h1>
  <p class="mt-1 text-sm text-slate-600">{% trans "Votre nouveau mot de passe est actif." %}</p>
  <a href="{% url 'core:post_login_redirect' %}"
     class="mt-5 inline-block px-4 py-2 text-sm bg-emerald-600 text-white rounded-md hover:bg-emerald-700">
    {% trans "Retour à mon espace" %}
  </a>
</div>
{% endblock %}
